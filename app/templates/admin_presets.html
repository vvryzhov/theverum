{% extends "admin_layout.html" %}
{% block admin_title %}Пресеты{% endblock %}
{% block admin_heading %}Пресеты текстов{% endblock %}
{% block admin_content %}
<p class="muted">Шаблоны для краткого заключения и блока «важные особенности» в отчёте.</p>
<div class="price-admin-grid">
  {% for p in presets %}
  <form method="post" action="/admin/presets/{{ p.id }}" class="price-edit card">
    <div class="field"><label>Тип</label>
      <select name="kind">
        <option value="conclusion" {% if p.kind=='conclusion' %}selected{% endif %}>Краткое заключение</option>
        <option value="notable_features" {% if p.kind=='notable_features' %}selected{% endif %}>Краткий отчет / особенности</option>
      </select>
    </div>
    <div class="field"><label>Название</label><input name="title" value="{{ p.title }}" required></div>
    <div class="field"><label>Текст шаблона</label><textarea name="body" rows="6">{{ p.body }}</textarea></div>
    <div class="field"><label>Порядок</label><input type="number" name="sort_order" value="{{ p.sort_order }}"></div>
    <div class="field"><label>Активен</label>
      <select name="active">
        <option value="1" {% if p.active %}selected{% endif %}>Да</option>
        <option value="0" {% if not p.active %}selected{% endif %}>Нет</option>
      </select>
    </div>
    <div class="hero-actions">
      <button class="btn gold">Сохранить</button>
      <button class="btn" formaction="/admin/presets/{{ p.id }}/delete" formmethod="post" onclick="return confirm('Удалить пресет?')">Удалить</button>
    </div>
  </form>
  {% endfor %}

  <form method="post" action="/admin/presets" class="price-edit card">
    <h3 style="margin-top:0">Новый пресет</h3>
    <div class="field"><label>Тип</label>
      <select name="kind">
        <option value="conclusion">Краткое заключение</option>
        <option value="notable_features">Краткий отчет / особенности</option>
      </select>
    </div>
    <div class="field"><label>Название</label><input name="title" required placeholder="Подлинность подтверждена"></div>
    <div class="field"><label>Текст шаблона</label><textarea name="body" rows="6" placeholder="По результатам проверки изделия {{'{{brand}}'}} {{'{{model}}'}} ..."></textarea></div>
    <div class="field"><label>Порядок</label><input type="number" name="sort_order" value="10"></div>
    <button class="btn gold">Добавить</button>
  </form>
</div>
{% endblock %}
